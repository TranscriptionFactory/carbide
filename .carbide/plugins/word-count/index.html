<!doctype html>
<html>
  <head>
    <title>Word Count Plugin</title>
  </head>
  <body>
    <script>
      const rpc = {
        send(method, ...params) {
          const id = Math.random().toString(36).substring(7);
          window.parent.postMessage({ id, method, params }, "*");
          return new Promise((resolve, reject) => {
            const handler = (event) => {
              if (event.data.id === id) {
                window.removeEventListener("message", handler);
                if (event.data.error) reject(event.data.error);
                else resolve(event.data.result);
              }
            };
            window.addEventListener("message", handler);
          });
        },
      };

      async function updateWordCount() {
        try {
          const text = await rpc.send("editor.get_value");
          const words = text.trim() ? text.trim().split(/\s+/).length : 0;
          await rpc.send(
            "ui.update_statusbar_item",
            "word-count-item",
            `${words} words (plugin)`,
          );
        } catch (e) {
          console.error("Word Count plugin error:", e);
        }
      }

      // Register status bar item on load
      rpc
        .send("ui.add_statusbar_item", {
          id: "word-count-item",
          priority: 100,
          initial_text: "0 words (plugin)",
        })
        .then(() => {
          console.log("Word Count plugin registered status bar item");
          // Poll for updates every 2 seconds
          setInterval(updateWordCount, 2000);
        });
    </script>
  </body>
</html>
