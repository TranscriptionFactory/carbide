<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="40" fill="#0a001a" />
  
  <defs>
    <!-- Vibrant Blue-Cyan-Purple Gradient -->
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="30%" stop-color="#0066ff" />
      <stop offset="70%" stop-color="#8000ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>

    <!-- Strong Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Symbol Highlight -->
    <filter id="whiteGlow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Flame Shape -->
  <path d="M256 30 
           L 300 120 
           C 380 180 420 280 420 360 
           C 420 460 350 500 256 500 
           C 162 500 92 460 92 360 
           C 92 280 132 180 212 120 
           L 256 30 Z" 
        fill="url(#flameGrad)" 
        filter="url(#glow)" />

  <!-- Inner Bright Core -->
  <path d="M256 120 
           C 280 180 340 240 340 320 
           C 340 400 300 440 256 440 
           C 212 440 172 400 172 320 
           C 172 240 232 180 256 120 Z" 
        fill="#00ffff" opacity="0.4" filter="url(#glow)" />

  <!-- Symbols Group -->
  <g transform="translate(256, 330)" filter="url(#whiteGlow)">
    <!-- Bold 'Greater Than' symbol (>) -->
    <path d="M-80 -70 L 40 0 L -80 70" 
          stroke="black" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M-80 -70 L 40 0 L -80 70" 
          stroke="#00ffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9" />
    
    <!-- Bold Asterisk (*) -->
    <g transform="translate(80, -90) scale(0.7) rotate(15)">
       <path d="M0 -60 L 0 60 M-52 -30 L 52 30 M-52 30 L 52 -30" 
             stroke="black" stroke-width="40" stroke-linecap="round" />
       <path d="M0 -60 L 0 60 M-52 -30 L 52 30 M-52 30 L 52 -30" 
             stroke="#00ffff" stroke-width="10" stroke-linecap="round" opacity="0.9" />
    </g>
  </g>
</svg>
