<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("carbide_active_theme_cache");
          if (!raw) return;
          var cache = JSON.parse(raw);
          var scheme = cache.color_scheme;
          if (cache.color_scheme_preference === "system") {
            scheme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (scheme) {
            document.documentElement.setAttribute("data-color-scheme", scheme);
            document.documentElement.style.setProperty("color-scheme", scheme);
          }
          // Pre-v2 caches may carry a culled theme's data_theme + full stale
          // token map: apply only the (theme-independent) color scheme and let
          // apply_theme rewrite a v2 cache on first paint.
          if (cache.v !== 2) return;
          var kept_themes = [
            "carbide",
            "glass",
            "spotlight",
            "theater",
            "obsidian",
          ];
          if (cache.data_theme && kept_themes.indexOf(cache.data_theme) !== -1) {
            document.documentElement.setAttribute(
              "data-theme",
              cache.data_theme,
            );
          }
          if (cache.density) {
            document.documentElement.setAttribute(
              "data-density",
              cache.density,
            );
          }
          if (cache.tokens) {
            var keys = Object.keys(cache.tokens);
            for (var i = 0; i < keys.length; i++) {
              document.documentElement.style.setProperty(
                keys[i],
                cache.tokens[keys[i]],
              );
            }
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
