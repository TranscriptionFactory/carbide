version = 3
# IWE Configuration — Carbide defaults
# Documentation: https://github.com/iwe-org/iwe

[library]
path = ""

# Commands define external executables that transform actions can invoke.
# The {{context}} variable expands to the selected text/block content.
# These ai_* commands are managed by the app and rewritten when you change
# the IWE AI provider in Settings > AI.  User-added commands are preserved.

[commands]

[commands.ai_rewrite]
run = "claude"
args = ["-p", "Rewrite the following text to improve clarity and readability. Keep the language personable, not overly formal. Simplify language, organize sentences logically, remove ambiguity. Preserve any markdown links. Do not include list item '-' or header '#' prefixes. Output only the rewritten text:\n\n{{context}}", "--output-format", "text"]
timeout_seconds = 120

[commands.ai_summarize]
run = "claude"
args = ["-p", "Summarize the following text concisely. Output only the summary:\n\n{{context}}", "--output-format", "text"]
timeout_seconds = 120

[commands.ai_expand]
run = "claude"
args = ["-p", "Expand the following text into a couple of detailed paragraphs. Preserve any markdown links. Do not include list item '-' or header '#' prefixes. Output only the expanded text:\n\n{{context}}", "--output-format", "text"]
timeout_seconds = 120

[commands.ai_keywords]
run = "claude"
args = ["-p", "Mark the most important keywords with bold using ** markdown syntax. Keep the text otherwise completely unchanged. Output only the text with bold keywords:\n\n{{context}}", "--output-format", "text"]
timeout_seconds = 120

[commands.ai_emojify]
run = "claude"
args = ["-p", "Add a relevant emoji before each list item, header, or paragraph. Keep the text otherwise completely unchanged. Output only the text with emojis:\n\n{{context}}", "--output-format", "text"]
timeout_seconds = 120

# Structural actions (extract, inline, sort, link)

[actions.extract]
type = "extract"
title = "Extract section"
key_template = "{{slug}}"

[actions.extract_all]
type = "extract_all"
title = "Extract all subsections"
key_template = "{{slug}}"

[actions.inline_section]
type = "inline"
title = "Inline as section"
inline_type = "section"

[actions.inline_quote]
type = "inline"
title = "Inline as quote"
inline_type = "quote"
keep_target = true

[actions.sort]
type = "sort"
title = "Sort list"

[actions.sort_reverse]
type = "sort"
title = "Sort list (reverse)"
reverse = true

[actions.link]
type = "link"
title = "Create link"
key_template = "{{slug}}"

# Transform actions — pipe content through external commands

[actions.rewrite]
type = "transform"
title = "Rewrite (AI)"
command = "ai_rewrite"
input_template = "{{context}}"

[actions.summarize]
type = "transform"
title = "Summarize (AI)"
command = "ai_summarize"
input_template = "{{context}}"

[actions.expand]
type = "transform"
title = "Expand (AI)"
command = "ai_expand"
input_template = "{{context}}"

[actions.keywords]
type = "transform"
title = "Keywords (AI)"
command = "ai_keywords"
input_template = "{{context}}"

[actions.emojify]
type = "transform"
title = "Emojify (AI)"
command = "ai_emojify"
input_template = "{{context}}"

[markdown]
refs_extension = ""
