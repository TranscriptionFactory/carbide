name: Release

on:
  push:
    tags: ["v*"]

jobs:
  signing_preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Verify updater signing credentials
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          tmp_file="$(mktemp)"
          printf 'signing-preflight\n' > "$tmp_file"
          pnpm tauri signer sign "$tmp_file" >/dev/null
          rm -f "$tmp_file" "$tmp_file.sig"

  generate-bindings:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libvulkan-dev \
            glslang-tools \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Stub excalidraw-dist for build
        run: |
          mkdir -p src-tauri/excalidraw-dist/assets
          touch src-tauri/excalidraw-dist/index.html
          touch src-tauri/excalidraw-dist/assets/.gitkeep

      - name: Stub sidecar binaries for build
        run: |
          triple="x86_64-unknown-linux-gnu"
          for bin in iwes rumdl carbide-cli; do
            touch "src-tauri/binaries/${bin}-${triple}"
            chmod +x "src-tauri/binaries/${bin}-${triple}"
          done

      - name: Generate TypeScript bindings
        run: cd src-tauri && cargo test specta_export::export_bindings -- --nocapture

      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated/bindings.ts

  create-release:
    needs: [signing_preflight]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create GitHub release (or reuse existing draft)
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for an existing draft release for this tag
          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq '.[] | select(.tag_name == "'"$GITHUB_REF_NAME"'" and .draft == true) | .id' \
            | head -1)

          if [ -n "$RELEASE_ID" ]; then
            echo "Reusing existing draft release: $RELEASE_ID"
          else
            RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$GITHUB_REF_NAME" \
              -f name="Carbide $GITHUB_REF_NAME" \
              -f target_commitish="$GITHUB_SHA" \
              -F draft=true \
              -F generate_release_notes=true \
              --jq '.id')
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create or find release for tag $GITHUB_REF_NAME"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  release:
    needs: [signing_preflight, generate-bindings, create-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            triple: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libvulkan-dev \
            glslang-tools \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Download TypeScript bindings
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated

      - name: Sync version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" src-tauri/crates/carbide-cli/Cargo.toml
          rm -f src-tauri/crates/carbide-cli/Cargo.toml.bak

      - name: Download iwes sidecar
        shell: bash
        run: bash scripts/download_iwes.sh "${{ matrix.triple }}"

      - name: Download rumdl sidecar
        shell: bash
        run: bash scripts/download_rumdl.sh "${{ matrix.triple }}"

      - name: Build carbide-cli sidecar
        shell: bash
        run: |
          target="${{ matrix.triple }}"
          cargo build --release --manifest-path src-tauri/Cargo.toml --package carbide-cli --target "$target"
          ext=""
          if [[ "$target" == *"windows"* ]]; then ext=".exe"; fi
          cp "src-tauri/target/${target}/release/carbide-cli${ext}" "src-tauri/binaries/carbide-cli-${target}${ext}"

      - uses: tauri-apps/tauri-action@v0.6.2
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=4096

  publish-release:
    needs: [release, create-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/${{ needs.create-release.outputs.release_id }}" \
            -F draft=false

  update-homebrew-tap:
    needs: [publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS DMG artifacts
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "$GITHUB_REF_NAME" \
            --repo TranscriptionFactory/carbide \
            --pattern "carbide_${VERSION}_aarch64.dmg" \
            --pattern "carbide_${VERSION}_x64.dmg" \
            --dir ./artifacts

      - name: Compute SHA256 checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SHA256_ARM64=$(sha256sum artifacts/carbide_${VERSION}_aarch64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA256_X64=$(sha256sum artifacts/carbide_${VERSION}_x64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Clone homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/TranscriptionFactory/homebrew-tap.git" tap

      - name: Update cask version and SHAs
        run: |
          CASK="tap/Casks/carbide.rb"
          awk -v ver="${VERSION}" -v arm="${SHA256_ARM64}" -v x64="${SHA256_X64}" '
            /^\s*version / { sub(/"[^"]*"/, "\"" ver "\"") }
            /on_arm/       { in_arm=1;   in_intel=0 }
            /on_intel/     { in_intel=1; in_arm=0 }
            /^\s*end/      { in_arm=0;   in_intel=0 }
            in_arm   && /^\s*sha256/ { sub(/"[^"]*"/, "\"" arm "\"") }
            in_intel && /^\s*sha256/ { sub(/"[^"]*"/, "\"" x64 "\"") }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"

      - name: Commit and push
        run: |
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/carbide.rb
          git commit -m "Update carbide cask to v${VERSION}"
          git push
