name: Release

on:
  push:
    tags: ["v*"]

jobs:
  signing_preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Verify updater signing credentials
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          tmp_file="$(mktemp)"
          printf 'signing-preflight\n' > "$tmp_file"
          pnpm tauri signer sign "$tmp_file" >/dev/null
          rm -f "$tmp_file" "$tmp_file.sig"

  generate-bindings:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Stub excalidraw-dist for build
        run: |
          mkdir -p src-tauri/excalidraw-dist/assets
          touch src-tauri/excalidraw-dist/index.html
          touch src-tauri/excalidraw-dist/assets/.gitkeep

      - name: Generate TypeScript bindings
        run: cd src-tauri && cargo test specta_export::export_bindings -- --nocapture

      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated/bindings.ts

  release:
    needs: [signing_preflight, generate-bindings]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Download TypeScript bindings
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated

      - uses: tauri-apps/tauri-action@v0.6.2
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Carbide ${{ github.ref_name }}"
          includeUpdaterJson: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=4096

  update-homebrew-tap:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS DMG artifacts
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "$GITHUB_REF_NAME" \
            --repo TranscriptionFactory/carbide \
            --pattern "carbide_${VERSION}_aarch64.dmg" \
            --pattern "carbide_${VERSION}_x64.dmg" \
            --dir ./artifacts

      - name: Compute SHA256 checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SHA256_ARM64=$(sha256sum artifacts/carbide_${VERSION}_aarch64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA256_X64=$(sha256sum artifacts/carbide_${VERSION}_x64.dmg | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Clone homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/TranscriptionFactory/homebrew-tap.git" tap

      - name: Update cask version and SHAs
        run: |
          CASK="tap/Casks/carbide.rb"
          awk -v ver="${VERSION}" -v arm="${SHA256_ARM64}" -v x64="${SHA256_X64}" '
            /^\s*version / { sub(/"[^"]*"/, "\"" ver "\"") }
            /on_arm/       { in_arm=1;   in_intel=0 }
            /on_intel/     { in_intel=1; in_arm=0 }
            /^\s*end/      { in_arm=0;   in_intel=0 }
            in_arm   && /^\s*sha256/ { sub(/"[^"]*"/, "\"" arm "\"") }
            in_intel && /^\s*sha256/ { sub(/"[^"]*"/, "\"" x64 "\"") }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"

      - name: Commit and push
        run: |
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/carbide.rb
          git commit -m "Update carbide cask to v${VERSION}"
          git push
